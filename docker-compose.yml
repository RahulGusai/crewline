services:
  postgres:
    image: postgres:16
    container_name: crewline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crewline
      POSTGRES_PASSWORD: crewline
      POSTGRES_DB: crewline
    ports:
      - "5432:5432"
    volumes:
      - crewline_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewline -d crewline"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: crewline-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - crewline_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: crewline-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/crewline-attachments;
      mc anonymous set download local/crewline-attachments;
      exit 0;
      "

volumes:
  crewline_pg_data:
  crewline_minio_data:
